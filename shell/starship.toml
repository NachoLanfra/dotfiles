# No agregar un salto de línea en blanco entre comandos
add_newline = false

# El formato exacto de lo que se va a mostrar (solo carpeta, git y la flechita)
format = "$directory$git_branch$git_status$character"

[directory]
style = "bold #d79921"
read_only = " [RO]"
truncation_length = 3
truncate_to_repo = true

[character]
success_symbol = "[❯](bold #b8bb26)"
error_symbol = "[❯](bold #fb4934)"

[git_branch]
symbol = "git:"
style = "bold #d3869b"
format = " [$symbol$branch]($style)"

[git_status]
style = "bold #fb4934"
format = "([ $all_status$ahead_behind]($style))"

[package]
disabled = true

[cmd_duration]
disabled = true

[nodejs]
symbol = "node "

[python]
symbol = "py "

[c]
symbol = "c "

[java]
symbol = "java "
